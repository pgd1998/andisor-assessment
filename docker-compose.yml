# ─────────────────────────────────────────────────────────────────────────────
# Andisor Inventory Platform — full stack.
#
#   docker compose up --build
#
# Brings up PostgreSQL, Redis, the API, the BullMQ worker, and the nginx-served
# frontend. A one-shot `migrate` job runs Prisma migrations + seeding before the
# API and worker start.
#
# Ports (host → container), override via .env:
#   frontend  8080 → 80      API  4000 → 4000
#   postgres  5432 → 5432    redis 6379 → 6379
# ─────────────────────────────────────────────────────────────────────────────
name: andisor

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-andisor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-andisor_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-andisor}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-andisor} -d ${POSTGRES_DB:-andisor}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies migrations and seeds the database, then exits.
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Named so the worker can reuse the exact same image without rebuilding.
    image: andisor-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      # The API container applies pending migrations and seeds an empty DB on
      # boot (see backend/docker-entrypoint.sh), so no separate migrate step.
      RUN_MIGRATIONS: 'true'
      SEED_FILE: /app/data/products.json
      DATABASE_URL: postgresql://${POSTGRES_USER:-andisor}:${POSTGRES_PASSWORD:-andisor_dev_password}@postgres:5432/${POSTGRES_DB:-andisor}?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-8080}
    volumes:
      - ./data:/app/data:ro
    ports:
      - '${API_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'node', '-e', "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    # Reuses the API image (same code); only the start command differs.
    # RUN_MIGRATIONS is left unset, so the worker never runs migrations/seed —
    # the API owns that. Waiting on the API (healthy) guarantees migrations have
    # already been applied before the worker starts processing jobs.
    image: andisor-backend
    restart: unless-stopped
    command: ['node', 'dist/worker.js']
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-andisor}:${POSTGRES_PASSWORD:-andisor_dev_password}@postgres:5432/${POSTGRES_DB:-andisor}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-8080}:80'
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
